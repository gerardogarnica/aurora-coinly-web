<aside
    [class]="asideClasses()"
    aria-label="Sidebar">
    <!-- Navigation -->
    <nav>
        <div class="py-6 flex justify-center">
            @if (isRailCollapsed()) {
                <img src="coinly_logo_icon.svg" alt="Aurora Coinly" class="w-8 h-8">
            } @else {
                <img src="coinly_logo.svg" alt="Aurora Coinly">
            }
        </div>

        <ul class="space-y-2">
            @for (menuItem of sidebarMenu; track menuItem.label) {
            <li>
                <a [routerLink]="menuItem.routerLink"
                    routerLinkActive="bg-coinly-primary font-bold"
                    [class]="itemClasses()"
                    [pTooltip]="menuItem.label ?? ''"
                    tooltipPosition="right"
                    [tooltipDisabled]="!isRailCollapsed()">
                    <i class="{{ menuItem.icon }} {{ iconClasses() }}"></i>
                    @if (!isRailCollapsed()) {
                        <span>{{ menuItem.label }}</span>
                    }
                </a>
            </li>
            }
        </ul>
    </nav>

    <div class="space-y-2 py-6">
        <!-- Profile -->
        <div>
            <a [routerLink]="['/profile']"
                routerLinkActive="bg-coinly-primary font-bold"
                [class]="itemClasses()"
                pTooltip="Profile"
                tooltipPosition="right"
                [tooltipDisabled]="!isRailCollapsed()">
                <i class="pi pi-fw pi-user {{ iconClasses() }}"></i>
                @if (!isRailCollapsed()) {
                    <span>Profile</span>
                }
            </a>
        </div>

        <!-- Settings -->
        <div>
            <a [routerLink]="['/settings']"
                routerLinkActive="bg-coinly-primary font-bold"
                [class]="itemClasses()"
                pTooltip="Settings"
                tooltipPosition="right"
                [tooltipDisabled]="!isRailCollapsed()">
                <i class="pi pi-fw pi-cog {{ iconClasses() }}"></i>
                @if (!isRailCollapsed()) {
                    <span>Settings</span>
                }
            </a>
        </div>

        <!-- Logout -->
        <div>
            <a href="#"
                [class]="itemClasses()"
                pTooltip="Log out"
                tooltipPosition="right"
                [tooltipDisabled]="!isRailCollapsed()">
                <i class="pi pi-fw pi-sign-out {{ iconClasses() }}"></i>
                @if (!isRailCollapsed()) {
                    <span>Log out</span>
                }
            </a>
        </div>
    </div>
</aside>
