<section>
    <span class="text-lg font-bold text-coinly-success-dark mb-2 block">Wallets summary</span>
    <p-chart [data]="chartData()" [options]="chartOptions" type="doughnut"></p-chart>
    <div class="flex justify-center items-center gap-2 mt-3">
        <p-toggleswitch inputId="onlyAvailable" [ngModel]="onlyAvailable()" (ngModelChange)="onlyAvailable.set($event)" />
        <label for="onlyAvailable" class="text-sm cursor-pointer">Only show available</label>
    </div>
</section>
