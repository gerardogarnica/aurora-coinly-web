<div class="p-4">
  <h1 class="text-2xl font-bold mb-4">Dashboard</h1>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <!-- Balance Summary -->
    <div class="bg-white p-4 rounded-lg shadow">
      <h2 class="text-lg font-semibold mb-2">Total Balance</h2>
      <p class="text-2xl font-bold text-gray-800">$0.00</p>
    </div>

    <!-- Income Summary -->
    <div class="bg-white p-4 rounded-lg shadow">
      <h2 class="text-lg font-semibold mb-2">Monthly Income</h2>
      <p class="text-2xl font-bold text-green-600">$0.00</p>
    </div>

    <!-- Expenses Summary -->
    <div class="bg-white p-4 rounded-lg shadow">
      <h2 class="text-lg font-semibold mb-2">Monthly Expenses</h2>
      <p class="text-2xl font-bold text-red-600">$0.00</p>
    </div>

    <!-- Savings Summary -->
    <div class="bg-white p-4 rounded-lg shadow">
      <h2 class="text-lg font-semibold mb-2">Monthly Savings</h2>
      <p class="text-2xl font-bold text-blue-600">$0.00</p>
    </div>
  </div>

  <!-- Recent Transactions -->
  <div class="mt-8">
    <h2 class="text-xl font-bold mb-4">Recent Transactions</h2>
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Description</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Amount</th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <!-- Empty state -->
          <tr>
            <td colspan="4" class="px-6 py-4 text-center text-gray-500">
              No transactions found
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
