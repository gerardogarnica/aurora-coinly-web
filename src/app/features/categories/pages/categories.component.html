<div class="p-4">
  <h1 class="text-2xl font-bold mb-4">Categories</h1>

  @if (errorMessage()) {
  <div class="mb-4 p-3 rounded bg-red-100 text-red-800 border border-red-200">
    {{ errorMessage() }}
  </div>
  }

  <div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
            Name
          </th>
          <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
            Type
          </th>
          <th scope="col" class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">
            Status
          </th>
          <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
            Actions
          </th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-200">
        @for (category of categories(); track category.categoryId) {
        <tr>
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="text-sm font-medium text-gray-900">{{ category.name }}</div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap">
            <div class="text-sm text-gray-500">{{ category.type }}</div>
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-center">
            @if (!category.isDeleted) {
            <span class="inline-block px-3 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-800">
              Active
            </span>
            } @else {
            <span class="inline-block px-3 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-800">
              Inactive
            </span>
            }
          </td>
          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
            <button class="text-indigo-600 hover:text-indigo-900 mr-3">Edit</button>
            <button class="text-red-600 hover:text-red-900">Delete</button>
          </td>
        </tr>
        } @empty {
        <tr>
          <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">
            No categories found
          </td>
        </tr>
        }
      </tbody>
    </table>
  </div>
</div>
