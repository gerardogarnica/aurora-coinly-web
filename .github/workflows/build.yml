name: Coinly Web CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # gerardogarnica/aurora-coinly-web

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: |
          if git ls-files 'src/**/*.spec.ts' | grep -q .; then
            npm test -- --watch=false --browsers=ChromeHeadless
          else
            echo "No spec files found — skipping tests."
          fi

  docker-build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
      packages: write

    outputs:
      env_name: ${{ steps.env.outputs.env_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "env_name=production" >> "$GITHUB_OUTPUT"
              ;;
            staging)
              echo "env_name=staging" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unrecognized branch '${{ github.ref_name }}' — no environment mapping defined."
              exit 1
              ;;
          esac

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            BUILD_CONFIGURATION=${{ steps.env.outputs.env_name }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.env_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Dokploy
    runs-on: ubuntu-latest
    needs: docker-build-push
    permissions: {}

    steps:
      - name: Trigger Dokploy webhook
        env:
          WEBHOOK_PROD: ${{ secrets.DOKPLOY_WEBHOOK_PROD }}
          WEBHOOK_STAGING: ${{ secrets.DOKPLOY_WEBHOOK_STAGING }}
        run: |
          if [[ "${{ needs.docker-build-push.outputs.env_name }}" == "production" ]]; then
            WEBHOOK="$WEBHOOK_PROD"
          else
            WEBHOOK="$WEBHOOK_STAGING"
          fi

          if [[ -z "$WEBHOOK" ]]; then
            echo "⚠️ Webhook no configurado aún — imagen publicada en GHCR, deploy omitido."
            exit 0
          fi

          curl -fsS -X POST "$WEBHOOK"
          echo "✅ Deploy disparado en Dokploy (${{ needs.docker-build-push.outputs.env_name }})"
