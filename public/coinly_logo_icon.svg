<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for coin -->
    <radialGradient id="coinGradientIcon" cx="0.3" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="70%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </radialGradient>

    <!-- Shadow filter -->
    <filter id="shadowIcon" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Single Coin -->
  <g filter="url(#shadowIcon)">
    <circle cx="50" cy="50" r="24" fill="url(#coinGradientIcon)" stroke="#D97706" stroke-width="2"/>
    <circle cx="50" cy="50" r="18" fill="none" stroke="#FCD34D" stroke-width="1.5" opacity="0.8"/>
    <circle cx="50" cy="50" r="12" fill="none" stroke="#FBBF24" stroke-width="1" opacity="0.6"/>
    <text x="50" y="56" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white">$</text>
  </g>
</svg>
